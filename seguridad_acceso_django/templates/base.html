<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Seguridad Django{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 2rem; }
        /* Estilo para que el botón de logout no rompa la estética del menú */
        .btn-logout {
            text-decoration: none;
            color: rgba(255,255,255,.55);
            padding: 0.5rem;
            border: none;
            background: none;
        }
        .btn-logout:hover {
            color: rgba(255,255,255,.75);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                <i class="bi bi-shield-check"></i> Seguridad Acceso
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <a class="nav-link" href="{% url 'datos_sensibles' %}">
                            <i class="bi bi-lock-fill"></i> Panel Protegido
                        </a>
                        
                        <span class="nav-link text-info fw-semibold">
                            <i class="bi bi-person-circle"></i> {{ user.username }}
                        </span>

                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm ms-2">
                                <i class="bi bi-box-arrow-right"></i> Salir
                            </button>
                        </form>
                    {% else %}
                        <a class="nav-link" href="{% url 'registro' %}">Crear Cuenta</a>
                        <a class="nav-link btn btn-primary btn-sm text-white ms-lg-2" href="{% url 'login' %}">
                            Iniciar Sesión
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
