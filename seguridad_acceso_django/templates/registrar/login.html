{% extends 'base.html' %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="row w-100 justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i> {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            {% if form.errors %}
                <div class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <strong>Error:</strong> Usuario o contraseña incorrectos.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-person-circle me-2"></i>Iniciar Sesión</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label text-secondary small fw-bold">Usuario</label>
                            <input type="text" name="username" 
                                   class="form-control form-control-lg {% if form.errors %}is-invalid{% endif %}" 
                                   id="id_username" placeholder="Tu usuario" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label text-secondary small fw-bold">Contraseña</label>
                            <div class="input-group">
                                <input type="password" name="password" 
                                       class="form-control form-control-lg {% if form.errors %}is-invalid{% endif %}" 
                                       id="id_password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">Entrar</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center bg-light border-0 py-3">
                    <p class="mb-0 text-muted small">¿No tienes cuenta?</p>
                    <a href="{% url 'registro' %}" class="btn btn-link btn-sm text-decoration-none fw-bold">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
